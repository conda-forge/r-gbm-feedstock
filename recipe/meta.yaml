{% set version = "2.3.0" %}

{% set posix = 'm2-' if win else '' %}

package:
  name: r-gbm
  version: {{ version|replace("-", "_") }}

source:
  fn: gbm_{{ version }}.tar.gz
  url:
    - {{ cran_mirror }}/src/contrib/gbm_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/gbm/gbm_{{ version }}.tar.gz
  sha256: 5874ba2d67ec9fedbd6ff932aa9fd4e3b95fabbe84cd243208f0bfa544f7a684

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/

# Suggests: knitr, pdp, RUnit, splines, viridis
requirements:
  build:
    - {{ compiler('c') }}        # [not win]
    - {{ stdlib("c") }}          # [not win]
    - {{ compiler('cxx') }}      # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('m2w64_cxx') }}        # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]

  host:
    - r-base
    - r-gridextra
    - r-lattice
    - r-survival

  run:
    - r-base
    - r-gridextra
    - r-lattice
    - r-survival

test:
  commands:
    - $R -e "library('gbm')"           # [not win]
    - "\"%R%\" -e \"library('gbm')\""  # [win]

about:
  home: https://github.com/gbm-developers/gbm
  license: GPL-2.0-or-later
  summary: An implementation of extensions to Freund and Schapire's AdaBoost  algorithm and Friedman's gradient boosting machine. Includes regression  methods for least squares, absolute loss, t-distribution loss, quantile  regression, logistic, multinomial logistic, Poisson, Cox proportional hazards  partial 
    likelihood, AdaBoost exponential loss, Huberized hinge loss, and  Learning to Rank measures (LambdaMart). Originally developed by Greg Ridgeway.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
